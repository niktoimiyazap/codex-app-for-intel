name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n scripts/build-intel-app.sh
          bash -n scripts/install-local-zip.sh
