      <stop stop-color="#FAFAFB"/>
      <stop offset="1" stop-color="#F2F4F7"/>
    </linearGradient>
    <linearGradient id="shine" x1="180" y1="28" x2="1210" y2="332" gradientUnits="userSpaceOnUse">
